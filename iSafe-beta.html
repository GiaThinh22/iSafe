<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>iSafe</title>
    <style>
    body {
        font-family: system-ui, sans-serif;
        background: #111;
        color: #eee;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
    }
    h1 { font-size: 1.3rem; margin-bottom: 4px; }
    p.sub { color: #aaa; margin-top: 0; }
    .stage {
        position: relative;
        width: 640px;
        max-width: 95vw;
    }
    video, canvas {
        position: absolute;
        top: 0; left: 0;
        width: 100%;
        border-radius: 0;
    }
    video { transform: scaleX(-1); }
    canvas { transform: scaleX(-1); }
    .controls {
        margin-top: 16px;
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
        justify-content: center;
    }
    button {
        padding: 8px 16px;
        border-radius: 0;
        border: none;
        background: #4f7cff;
        color: white;
        font-weight: 600;
        cursor: pointer;
    }
    .readout {
        margin-top: 18px;
        font-size: 2.2rem;
        font-weight: 700;
    }
    .status { color: #9a9; font-size: 0.9rem; min-height: 1.2em; }
    .warning {
        margin-top: 6px;
        font-weight: 600;
        min-height: 1.4em;
    }
    .warning.tooClose { color: #ff5c5c; }
    .warning.ok { color: #7cd992; }
    .modeBtn { background: #333; }
    .modeBtn.active { background: #4f7cff; }
    .placeholder-box {
        width: 640px;
        max-width: 95vw;
        aspect-ratio: 4/3;
        background: #000;
        border-radius: 0;
    }
    </style>
    </head>
    <body>
        <h1>iSafe</h1>
        <div class="stage">
        <div class="placeholder-box"></div>
        <video id="video" autoplay muted playsinline></video>
        <canvas id="overlay"></canvas>
        </div>

        <div class="controls">
        <button id="adultBtn" class="modeBtn active">Adult</button>
        <button id="kidBtn" class="modeBtn">Kid</button>
        </div>

        <div class="readout" id="distanceReadout">? cm</div>
        <div class="status" id="status">Loading...</div>
        <div class="warning" id="warning"></div>

        <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
        
        <script>
        const videoEl = document.getElementById('video');
        const canvasEl = document.getElementById('overlay');
        const ctx = canvasEl.getContext('2d');
        const statusEl = document.getElementById('status');
        const warningEl = document.getElementById('warning');
        const distanceReadout = document.getElementById('distanceReadout');

        const MIN_DISTANCE_CM = 50;

        const EYE_DISTANCE_PRESETS = {
            adult: 63,
            kid: 54
        };
        let REAL_EYE_DISTANCE_MM = EYE_DISTANCE_PRESETS.adult;

        const ASSUMED_HORIZONTAL_FOV_DEG = 65;

        let focalLengthPx = null;
        let currentPixelEyeDist = null;

        function estimateFocalLength(frameWidthPx) {
            const fovRad = ASSUMED_HORIZONTAL_FOV_DEG * Math.PI / 180;
            return (frameWidthPx / 2) / Math.tan(fovRad / 2);
        }

        const LEFT_IRIS_CENTER = 468;
        const RIGHT_IRIS_CENTER = 473;

        function onResults(results) {
            canvasEl.width = videoEl.videoWidth;
            canvasEl.height = videoEl.videoHeight;
            ctx.clearRect(0, 0, canvasEl.width, canvasEl.height);

            if (!results.multiFaceLandmarks || results.multiFaceLandmarks.length === 0) {
                statusEl.textContent = "Error: No face detected.";
                warningEl.textContent = "";
                warningEl.className = "warning";
                currentPixelEyeDist = null;
                return;
            }

            const landmarks = results.multiFaceLandmarks[0];
            const left = landmarks[LEFT_IRIS_CENTER];
            const right = landmarks[RIGHT_IRIS_CENTER];

            const x1 = left.x * canvasEl.width;
            const y1 = left.y * canvasEl.height;
            const x2 = right.x * canvasEl.width;
            const y2 = right.y * canvasEl.height;

            currentPixelEyeDist = Math.hypot(x2 - x1, y2 - y1);

            ctx.fillStyle = "#4f7cff";
            [ [x1,y1], [x2,y2] ].forEach(([x,y]) => {
                ctx.beginPath();
                ctx.arc(x, y, 4, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.strokeStyle = "#4f7cff";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.stroke();

            if (focalLengthPx === null) {
                focalLengthPx = estimateFocalLength(canvasEl.width);
            }

            const distanceMm = (REAL_EYE_DISTANCE_MM * focalLengthPx) / currentPixelEyeDist;
            const distanceCm = distanceMm / 10;
            distanceReadout.textContent = distanceCm.toFixed(1) + " cm";
            statusEl.textContent = "Loading...";

            if (distanceCm < MIN_DISTANCE_CM) {
                warningEl.textContent = "You are too close!";
                warningEl.className = "warning tooClose";
            } else {
                warningEl.textContent = "Keep doing what you're doing...";
                warningEl.className = "warning ok";
            }
        }

        const faceMesh = new FaceMesh({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
        });
        faceMesh.setOptions({
            maxNumFaces: 1,
            refineLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });
        faceMesh.onResults(onResults);

        const camera = new Camera(videoEl, {
            onFrame: async () => {
                await faceMesh.send({ image: videoEl });
            },
            width: 640,
            height: 480
        });
        camera.start().then(() => {
            statusEl.textContent = "Loading...";
        }).catch(err => {
            statusEl.textContent = "Error: Camera.";
        });

        const adultBtn = document.getElementById('adultBtn');
        const kidBtn = document.getElementById('kidBtn');

        function setMode(mode) {
            REAL_EYE_DISTANCE_MM = EYE_DISTANCE_PRESETS[mode];
            adultBtn.classList.toggle('active', mode === 'adult');
            kidBtn.classList.toggle('active', mode === 'kid');
            focalLengthPx = null;
        }

        adultBtn.addEventListener('click', () => setMode('adult'));
        kidBtn.addEventListener('click', () => setMode('kid'));
        </script>
    </body>
</html>
